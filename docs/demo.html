<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sovereign Identity Verification Demo</title>
<style>
body{font-family:Arial;max-width:900px;margin:40px auto;padding:20px}
textarea{width:100%;height:220px}
button{padding:12px 20px}
#result{margin-top:20px;font-weight:bold}
</style>
</head>
<body>

<h1>🔐 Sovereign Identity Verification Demo</h1>

<p>Paste Verifiable Credential JSON:</p>

<textarea id="credential">
{
  "id":"credential_demo_001",
  "issuer":"Sovereign Identity Engine",
  "network":"Base Mainnet",
  "type":"VerifiableCredential"
}
</textarea>

<br><br>

<button onclick="verify()">Verify Credential</button>

<div id="result"></div>

<script>
async function verify(){

const data=document.getElementById("credential").value;

try{
JSON.parse(data);

const hashBuffer=await crypto.subtle.digest(
"SHA-256",
new TextEncoder().encode(data)
);

const hash=[...new Uint8Array(hashBuffer)]
.map(x=>x.toString(16).padStart(2,"0"))
.join("");

document.getElementById("result").innerHTML=
"✅ Credential Valid<br><br>SHA-256:<br>"+hash;

}catch(e){

document.getElementById("result").innerHTML=
"❌ Invalid Credential JSON";

}

}
</script>

</body>
</html>
